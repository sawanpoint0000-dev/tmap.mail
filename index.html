<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TAMP.OTP - User</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root {
    --bg: #020617;
    --card: #0f172a;
    --primary: #6366f1;
    --green: #22c55e;
    --red: #ef4444;
    --text: #e5e7eb;
}
* { box-sizing: border-box; margin:0; padding:0; }
body {
    font-family: system-ui, -apple-system, sans-serif;
    background: radial-gradient(circle at top, #1e1b4b, #020617);
    color: var(--text);
    min-height: 100vh;
    padding: 1rem;
    line-height: 1.5;
}
.card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    border-radius: 1rem;
    padding: 1.25rem;
    margin: 1rem 0;
    width: 100%;
    max-width: 28rem;
    margin-left: auto;
    margin-right: auto;
}
input, button, select {
    width: 100%;
    padding: 0.75rem 1rem;
    border-radius: 0.625rem;
    border: none;
    outline: none;
    background: #0f172a;
    color: white;
    font-size: 1rem;
}
input::placeholder { color: #94a3b8; }
button {
    background: linear-gradient(135deg, var(--primary), #4338ca);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    min-height: 2.75rem;
}
button:hover { opacity: 0.92; transform: translateY(-1px); }
.logout, .topup-btn, .cancel-btn {
    width: auto;
    padding: 0.5rem 1rem;
    font-size: 0.875rem;
}
.logout { background: linear-gradient(135deg, var(--red), #991b1b); }
.topup-btn { background: linear-gradient(135deg, var(--green), #15803d); }
.cancel-btn { 
    background: linear-gradient(135deg, #ef4444, #b91c1c); 
    color: white;
}
.cancel-btn:disabled {
    background: #475569;
    cursor: not-allowed;
}
.hide { display: none !important; }
.row {
    background: #0f172a;
    padding: 0.75rem;
    border-radius: 0.75rem;
    margin-bottom: 0.625rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    align-items: center;
}
.row span { flex: 1 1 auto; font-size: 0.875rem; word-break: break-all; }
.copy, .copy-otp, .copy-pass {
    background: linear-gradient(135deg, var(--green), #15803d);
    color: black;
    width: auto;
    padding: 0.5rem 0.875rem;
    font-size: 0.8125rem;
    min-width: 3.5rem;
    border: none;
    border-radius: 0.375rem;
    cursor: pointer;
}
.copy-otp, .copy-pass { min-width: 4.2rem; }
.otp {
    width: 5.5rem;
    text-align: center;
    font-weight: bold;
    color: #94a3b8;
    background: #020617;
    border: 1px solid #4b5563;
    border-radius: 0.5rem;
    padding: 0.375rem;
}
.otp.has-otp {
    color: var(--green);
    border-color: var(--green);
    background: rgba(34,197,94,0.1);
}
.time { font-size: 0.75rem; color: #fca5a5; min-width: 3.5rem; text-align: right; }
.avatar {
    width: 3rem; height: 3rem; border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--green));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.375rem; font-weight: bold; color: black;
}
.auth-container { width: 100%; max-width: 28rem; }
.tab-buttons { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; }
.tab-btn { flex: 1; padding: 0.75rem; border-radius: 0.625rem; font-weight: 600; font-size: 0.95rem; }
.active { background: var(--primary)!important; color: white!important; }
.error { color: var(--red); font-size: 0.8125rem; margin-top: 0.25rem; display: none; }
.link { color: #60a5fa; cursor: pointer; text-decoration: underline; font-size: 0.875rem; }
.mt-3 { margin-top: 0.75rem; }
.text-center { text-align: center; }
@media (max-width: 480px) {
    body { padding: 0.75rem; font-size: 0.95rem; }
    .card { padding: 1rem; border-radius: 0.875rem; }
    .tab-buttons { flex-direction: column; gap: 0.5rem; }
    button, input, select { padding: 0.875rem 1rem; }
    .row { flex-direction: column; align-items: stretch; }
}
</style>
</head>
<body>
<audio id="beep" preload="auto">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<!-- Auth Section -->
<div class="auth-container" id="auth">
    <div class="card">
        <div class="tab-buttons">
            <button id="signin-tab" class="tab-btn active">Sign In</button>
            <button id="signup-tab" class="tab-btn">Sign Up</button>
        </div>
        <div id="signin-form">
            <form id="signin-form-el">
                <input type="email" id="signin-email" placeholder="Email" required autocomplete="email">
                <div id="signin-email-error" class="error">Please enter a valid email</div>
                <input type="password" id="signin-pass" placeholder="Password" required autocomplete="current-password">
                <div id="signin-pass-error" class="error">Password is required</div>
                <button type="submit">Sign In</button>
            </form>
            <div class="mt-3 text-center">
                <span class="link" id="forgot-pass">Forgot Password?</span>
            </div>
            <div class="mt-3 text-center">
                Don't have an account? <span class="link" id="go-to-signup">Sign Up</span>
            </div>
        </div>
        <div id="signup-form" class="hide">
            <form id="signup-form-el">
                <input type="email" id="signup-email" placeholder="Email" required autocomplete="email">
                <div id="signup-email-error" class="error">Please enter a valid email</div>
                <input type="password" id="signup-pass" placeholder="Password" required autocomplete="new-password">
                <div id="signup-pass-error" class="error">Password must be at least 6 characters</div>
                <input type="password" id="signup-confirm" placeholder="Confirm Password" required>
                <div id="signup-confirm-error" class="error">Passwords do not match</div>
                <button type="submit">Sign Up</button>
            </form>
            <div class="mt-3 text-center">
                Already have an account? <span class="link" id="go-to-signin">Sign In</span>
            </div>
        </div>
    </div>
</div>

<!-- Main App -->
<div id="app" class="hide">
    <div class="card" style="display:flex; justify-content:space-between; align-items:center; gap:0.75rem; flex-wrap:wrap;">
        <b style="font-size:1.25rem;">🚀 TAMP.OTP</b>
        <div style="display:flex; gap:0.625rem; flex-wrap:wrap;">
            <button class="topup-btn" onclick="openWhatsAppTopup()">Top Up</button>
            <button class="logout" onclick="logout()">Logout</button>
        </div>
    </div>
    <div class="card" id="userBox">
        <div style="display:flex; gap:0.75rem; align-items:center;">
            <div class="avatar" id="avatar"></div>
            <div>
                <div style="font-weight:700; font-size:1.1rem;">My Profile</div>
                <div id="userEmail" style="font-size:0.875rem; color:#c7d2fe; word-break:break-all;"></div>
            </div>
        </div>
        <div style="margin:1.25rem 0; font-size:1.1rem;">
            Balance: ₹ <b id="bal">0</b>
        </div>
      
        <select id="userDomain">
            <option value="">-- Select Domain --</option>
        </select>
      
        <button id="buyBtn" style="margin-top:1rem; background:linear-gradient(135deg,var(--green),#15803d);" onclick="buyMail()">
            Buy Mail - ₹<span id="currentPrice">0</span>
        </button>
    </div>
    <div id="list" class="card">
        <h3 style="margin-bottom:1rem;">📩 Your OTPs & Details</h3>
    </div>
</div>

<!-- Reset Modal -->
<div id="reset-modal" class="hide" style="position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;">
    <div class="card" style="max-width:24rem;width:92%;">
        <h3 style="margin:0 0 1rem;">Reset Password</h3>
        <input type="email" id="reset-email" placeholder="Enter your email" required>
        <input type="password" id="new-pass" placeholder="New Password" style="margin:0.75rem 0;">
        <button onclick="handleReset()">Reset Password</button>
        <div class="mt-3 text-center">
            <span class="link" onclick="document.getElementById('reset-modal').classList.add('hide')">Cancel</span>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
firebase.initializeApp({
    apiKey: "AIzaSyDi40uxY5aC8R3xqacPL393h67TuQ4RiVo",
    databaseURL: "https://real-time-chat-box-179ea-default-rtdb.firebaseio.com"
});
const db = firebase.database();
const EXPIRE = 600000;
const CANCEL_DELAY = 120000; // 2 minutes

let uid = "";
let currentPrice = 0;

function beep() {
    const a = document.getElementById("beep");
    a.currentTime = 0;
    a.play().catch(() => {});
}

function openWhatsAppTopup() {
    if (!uid) return alert("Please login first!");
    const whatsappNumber = "919341490105";
    const message = `Hello Sir,\nI want to Top Up in TAMP.OTP\nMy User ID: ${uid}\nPlease tell me payment details.\nThank you!`;
    const url = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;
    window.open(url, '_blank');
}

// Tab Switching, Sign In, Sign Up, Reset Password (aapka original)
const signinTab = document.getElementById('signin-tab');
const signupTab = document.getElementById('signup-tab');
const signinForm = document.getElementById('signin-form');
const signupForm = document.getElementById('signup-form');

signinTab.onclick = () => {
    signinTab.classList.add('active'); signupTab.classList.remove('active');
    signinForm.classList.remove('hide'); signupForm.classList.add('hide');
};
signupTab.onclick = () => {
    signupTab.classList.add('active'); signinTab.classList.remove('active');
    signupForm.classList.remove('hide'); signinForm.classList.add('hide');
};
document.getElementById('go-to-signup').onclick = () => signupTab.click();
document.getElementById('go-to-signin').onclick = () => signinTab.click();

document.getElementById('signin-form-el').addEventListener('submit', e => {
    e.preventDefault();
    const email = document.getElementById('signin-email').value.trim();
    const pass = document.getElementById('signin-pass').value;
    if (!email || !pass) return alert("Email and Password required");
    db.ref("users").once("value", snap => {
        let found = false;
        snap.forEach(child => {
            const u = child.val();
            if (u.email === email && u.pass === pass) {
                localStorage.uid = child.key;
                found = true;
            }
        });
        if (found) location.reload();
        else alert("Incorrect email or password");
    });
});

document.getElementById('signup-form-el').addEventListener('submit', e => {
    e.preventDefault();
    const email = document.getElementById('signup-email').value.trim();
    const pass = document.getElementById('signup-pass').value;
    const confirm = document.getElementById('signup-confirm').value;
    if (!email.includes('@')) return document.getElementById('signup-email-error').style.display = 'block';
    if (pass.length < 6) return document.getElementById('signup-pass-error').style.display = 'block';
    if (pass !== confirm) return document.getElementById('signup-confirm-error').style.display = 'block';
    const newUid = "u" + Date.now();
    db.ref("users/" + newUid).set({
        email, pass, balance: 0, canBuy: true, blocked: false
    }).then(() => {
        localStorage.uid = newUid;
        location.reload();
    });
});

document.getElementById('forgot-pass').onclick = () => {
    document.getElementById('reset-modal').classList.remove('hide');
};

function handleReset() {
    const email = document.getElementById('reset-email').value.trim();
    const newPass = document.getElementById('new-pass').value;
    if (!email || newPass.length < 6) return alert("Valid email and new password (min 6 chars) required");
    db.ref("users").once("value", snap => {
        let foundKey = null;
        snap.forEach(child => {
            if (child.val().email === email) foundKey = child.key;
        });
        if (foundKey) {
            db.ref("users/" + foundKey + "/pass").set(newPass);
            alert("Password reset successful!");
            document.getElementById('reset-modal').classList.add('hide');
            signinTab.click();
        } else {
            alert("Email not found");
        }
    });
}

function logout() {
    localStorage.clear();
    location.reload();
}

// Auto Login
uid = localStorage.uid || "";
if (uid) {
    document.getElementById("auth").classList.add("hide");
    document.getElementById("app").classList.remove("hide");
    db.ref("users/" + uid).on("value", snap => {
        if (!snap.exists()) return logout();
        const u = snap.val();
        document.getElementById("bal").innerText = u.balance || 0;
        document.getElementById("userEmail").innerText = u.email || "";
        document.getElementById("avatar").innerText = (u.email || "?").charAt(0).toUpperCase();
        if (u.blocked) logout();
    });
}

// Load Domains with Price
db.ref("domains").on("value", snap => {
    const select = document.getElementById("userDomain");
    select.innerHTML = '<option value="">-- Select Domain --</option>';
    snap.forEach(d => {
        const data = d.val();
        const stock = data.stock || 0;
        const price = data.price || 10;
        if (stock > 0 && data.name) {
            select.innerHTML += `<option value="${d.key}" data-price="${price}">${data.name} (${stock}) - ₹${price}</option>`;
        }
    });
});

// Update Buy Button Price
document.getElementById("userDomain").addEventListener("change", function() {
    const selectedOption = this.options[this.selectedIndex];
    if (selectedOption.value) {
        currentPrice = parseFloat(selectedOption.getAttribute("data-price")) || 10;
        document.getElementById("currentPrice").innerText = currentPrice;
    } else {
        document.getElementById("currentPrice").innerText = "0";
    }
});

// Buy Mail
function buyMail() {
    const domainKey = document.getElementById("userDomain").value;
    if (!domainKey) return alert("Please select a domain");

    db.ref("users/" + uid).once("value", uSnap => {
        const user = uSnap.val();
        if (!user) return alert("User not found");
        if (user.canBuy === false) return alert("Buying is temporarily disabled");
        if ((user.balance || 0) < currentPrice) return alert(`Insufficient balance! You need ₹${currentPrice}`);

        db.ref("mails/" + domainKey).orderByChild("no").limitToFirst(1).once("value", mailSnap => {
            if (!mailSnap.exists()) return alert("No mails available in this domain right now");

            let mailKey, mailData;
            mailSnap.forEach(m => {
                mailKey = m.key;
                mailData = m.val();
            });

            db.ref("msg").push({
                email: mailData.email,
                password: mailData.password || "",
                user: uid,
                time: Date.now(),
                otp: "",
                domainKey: domainKey,
                mailKey: mailKey,
                price: currentPrice,
                canCancel: true
            });

            db.ref("mails/" + domainKey + "/" + mailKey).remove();
            db.ref("domains/" + domainKey + "/stock").transaction(n => (n || 0) - 1);
            db.ref("users/" + uid + "/balance").transaction(b => (b || 0) - currentPrice);

            beep();
        });
    });
}

// Real-time Messages with Cancel Button
db.ref("msg").on("child_added", snap => {
    const data = snap.val();
    if (data.user !== uid) return;

    const row = document.createElement("div");
    row.className = "row";
    row.dataset.msgKey = snap.key;

    row.innerHTML = `
        <button class="copy">Copy Email</button>
        <span>${data.email}</span>
        <input class="otp" disabled value="${data.otp || 'Waiting...'}">
        <button class="copy-otp">Copy OTP</button>
        ${data.password ? `
            <button class="copy-pass" style="background:#eab308;">Copy Pass</button>
            <span style="font-size:0.8rem; color:#94a3b8; margin-left:8px;">Pass: ${data.password}</span>
        ` : ''}
        <button class="cancel-btn" id="cancel-${snap.key}" disabled>Cancel</button>
        <span class="time">10:00</span>
    `;

    const cancelBtn = row.querySelector(`#cancel-${snap.key}`);

    // 2 minute baad Cancel button active
    setTimeout(() => {
        if (cancelBtn && data.canCancel) {
            cancelBtn.disabled = false;
            cancelBtn.onclick = () => cancelPurchase(snap.key, data, row);
        }
    }, CANCEL_DELAY);

    // OTP aate hi pura row remove
    db.ref("msg/" + snap.key + "/otp").on("value", otpSnap => {
        const otpVal = otpSnap.val() || "";
        row.querySelector(".otp").value = otpVal || "Waiting...";
        if (otpVal) {
            row.remove();   // OTP aate hi pura box hat jaye
        }
    });

    // Copy functions
    row.querySelector(".copy").onclick = () => navigator.clipboard.writeText(data.email);
    row.querySelector(".copy-otp").onclick = () => {
        const val = row.querySelector(".otp").value.trim();
        if (val && val !== "Waiting...") navigator.clipboard.writeText(val);
    };
    if (row.querySelector(".copy-pass")) {
        row.querySelector(".copy-pass").onclick = () => {
            if (data.password) navigator.clipboard.writeText(data.password);
        };
    }

    document.getElementById("list").prepend(row);
    startTimer(data.time, row.querySelector(".time"), snap.key);
});

// Cancel Function
function cancelPurchase(msgKey, data, rowElement) {
    if (!data.domainKey || !data.mailKey) return;

    // Paisa wapas
    db.ref("users/" + uid + "/balance").transaction(b => (b || 0) + (data.price || 0));

    // Mail wapas stock mein
    db.ref("mails/" + data.domainKey + "/" + data.mailKey).set({
        email: data.email,
        password: data.password || "",
        no: Date.now()
    });
    db.ref("domains/" + data.domainKey + "/stock").transaction(n => (n || 0) + 1);

    // Pura row remove
    if (rowElement) rowElement.remove();

    // Msg delete
    db.ref("msg/" + msgKey).remove();
}

// Timer
function startTimer(startTime, el, msgKey) {
    const interval = setInterval(() => {
        const left = EXPIRE - (Date.now() - startTime);
        if (left <= 0) {
            clearInterval(interval);
            db.ref("msg/" + msgKey).remove();
            if (el) el.innerText = "Expired";
        } else {
            const min = Math.floor(left / 60000);
            const sec = Math.floor((left % 60000) / 1000);
            if (el) el.innerText = `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }
    }, 1000);
}
</script>
</body>
</html>
